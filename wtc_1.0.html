<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTC 1.0 — Whinfell Transmission Control</title>
    <link rel="stylesheet" href="css/01_console.css">
    <style>
        .tab { cursor: pointer; padding: 10px 16px; border-bottom: 3px solid transparent; }
        .tab.active { border-bottom: 3px solid #0A4D2E; background: rgba(10, 77, 46, 0.2); font-weight: bold; }
        .toast { position:fixed; bottom:20px; right:20px; background:#0A4D2E; color:white; padding:12px 20px; border-radius:6px; z-index:9999; }
        .panel { position: relative; transition: all 0.2s; }
        .panel:hover, .hover-active { transform: scale(1.03); box-shadow: 0 0 20px rgba(10, 77, 46, 0.8); border: 3px solid #0A4D2E !important; background: rgba(10, 77, 46, 0.25) !important; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">WHINFELL</div>
        <div class="tabs" id="tabs"></div>
        <div class="top-right">
            <button onclick="globalArticulate()">A</button>
            <button onclick="refreshData()">🔄</button>
            <button onclick="toggleTheme()">🌗</button>
        </div>
    </div>

    <div class="main-content" id="mainContent"></div>

    <script src="js/02_core.js"></script>
    <script>
        let currentTabId = 6;

        const modules = [
            { id: 1, code: "ART", name: "Articulate" },
            { id: 2, code: "ARK", name: "Ark" },
            { id: 3, code: "BAS", name: "Basis" },
            { id: 4, code: "BBD", name: "Bang Bang Da" },
            { id: 5, code: "COM", name: "Compute" },
            { id: 6, code: "RCV", name: "Risk Curve" },
            { id: 7, code: "SQ3", name: "SQ3" },
            { id: 8, code: "DICT", name: "Data Dictionary" },
            { id: 9, code: "DRONE", name: "Drone Wars" }
        ];

        function renderTabs() {
            document.getElementById('tabs').innerHTML = modules.map(m => `<div class="tab" onclick="switchModule(${m.id})">${m.id}. ${m.code}</div>`).join('');
        }

        function switchModule(id) {
            currentTabId = id;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.tab');
            if (tabs[id-1]) tabs[id-1].classList.add('active');

            const content = document.getElementById('mainContent');

            if (id === 6) {
                const curveData = window.ARK ? window.ARK.get('risk_curve') : null;
                if (curveData && curveData.nodes) {
                    let html = `<h2>Risk Curve (RCV)</h2><p style="color:green;">✅ Loaded • ${curveData.as_of}</p><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:20px;">`;
                    Object.entries(curveData.nodes).forEach(([key, node]) => {
                        html += `<div class="panel" style="background:var(--bg-card);padding:20px;border-radius:8px;border:1px solid var(--border);" onmouseover="showHover(this)" onmouseout="hideHover(this)">
                            <h3>${key.charAt(0).toUpperCase() + key.slice(1)}</h3>
                            <div style="font-size:48px;font-weight:700;color:#0A4D2E;">${node.score}</div>
                            <div>${node.status} ${node.quartile}</div>
                            <p>${node.description}</p>
                            <button onclick="articulateNode('${key}')">A</button>
                        </div>`;
                    });
                    html += `</div>`;
                    content.innerHTML = html;
                } else {
                    content.innerHTML = `<h2>Risk Curve (RCV)</h2><p style="color:red;">No nodes loaded.</p>`;
                }
            } else if (id === 8) {
                content.innerHTML = `<h2>Data Dictionary (DICT)</h2><button onclick="downloadCSVFromARK()">Export CSV</button>`;
            } else if (id === 9) {
                content.innerHTML = `<h2>Drone Wars</h2><button onclick="triggerDroneWars()">Launch</button>`;
            } else {
                content.innerHTML = `<h2>Module ${id}</h2>`;
            }
        }

        function showHover(el) { if (el) el.classList.add('hover-active'); }
        function hideHover(el) { if (el) el.classList.remove('hover-active'); }

        function articulateNode(key) {
            const node = (window.ARK && window.ARK.get('risk_curve') && window.ARK.get('risk_curve').nodes[key]) || {};
            const prompt = `Goldman Prop Desk Chief - ${key} Analysis\nScore: ${node.score}\nStatus: ${node.status}\nQuartile: ${node.quartile}\nDescription: ${node.description}\n\n- Signal calculation?\n- Regime?\n- Timeframe comparison?\n- Socratic?\n- Trades?`;
            navigator.clipboard.writeText(prompt).then(() => showToast(`Prompt copied for ${key}`)).catch(() => alert(prompt));
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function refreshData() { location.reload(); }
        function globalArticulate() { showToast("Global Snapshot"); }
        function toggleTheme() { }
        function downloadCSVFromARK() { showToast("CSV"); }
        function triggerDroneWars() { showToast("Drone Wars"); }

        renderTabs();
        switchModule(6);
    </script>
</body>
</html>
