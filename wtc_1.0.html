<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTC 1.0 — Whinfell Transmission Control</title>
    <link rel="stylesheet" href="css/01_console.css">
    <style>
        .tab { cursor: pointer; padding: 10px 16px; border-bottom: 3px solid transparent; }
        .tab.active { border-bottom: 3px solid #0A4D2E; background: rgba(10, 77, 46, 0.2); font-weight: bold; }
        .toast { position:fixed; bottom:20px; right:20px; background:#0A4D2E; color:white; padding:12px 20px; border-radius:6px; z-index:9999; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">WHINFELL</div>
        <div class="tabs" id="tabs"></div>
        <div class="top-right">
            <button onclick="articulate()">A</button>
            <button onclick="refreshData()">🔄</button>
            <button onclick="toggleTheme()">🌗</button>
        </div>
    </div>

    <div class="main-content" id="mainContent"></div>

    <script src="js/02_core.js"></script>
    <script>
        let currentTabId = 6;

        const modules = [ /* ... same as before ... */ ];

        function renderTabs() { /* ... same ... */ }

        async function switchModule(id) {
            currentTabId = id;
            /* ... tab active logic ... */

            const content = document.getElementById('mainContent');
            
            if (id === 6) {
                content.innerHTML = `<h2>Risk Curve — Loading ARK...</h2><pre id="debugLog"></pre>`;
                const debug = document.getElementById('debugLog');

                console.log("RCV switch — ARK status:", !!window.ARK);
                debug.textContent += "ARK present: " + !!window.ARK + "\n";

                let curveData = null;
                if (window.ARK && typeof window.ARK.get === 'function') {
                    curveData = window.ARK.get('risk_curve');
                    debug.textContent += "curveData: " + !!curveData + "\n";
                    debug.textContent += JSON.stringify(curveData, null, 2);
                }

                if (curveData && curveData.nodes) {
                    let html = `<h2>Risk Curve (RCV) — LIVE</h2><p>✅ Loaded ${curveData.as_of}</p><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:20px;">`;
                    Object.entries(curveData.nodes).forEach(([key, node]) => {
                        const score = node.score ?? '—';
                        const color = "#0A4D2E";
                        html += `<div style="background:var(--bg-card);padding:20px;border-radius:8px;border:1px solid var(--border);">
                            <h3>${key}</h3>
                            <div style="font-size:42px;font-weight:700;color:${color};">${score}</div>
                            <div>${node.status || 'OK'}</div>
                        </div>`;
                    });
                    html += `</div>`;
                    content.innerHTML = html;
                }
            } else if (id === 8) {
                /* DICT code */
            } else if (id === 9) {
                /* Drone Wars */
            } else {
                /* default */
            }
        }

        /* Keep all other functions: showHover, articulate, refreshData, etc. */

        renderTabs();
        switchModule(6);
    </script>
</body>
</html>
