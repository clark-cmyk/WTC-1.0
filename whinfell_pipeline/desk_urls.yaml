barchart:
  # Easiest per-ticker CSV path: Main Watchlist → find ticker → choose CSV (no alternate flows)
  ticker_csv_navigation:
    path: "Main Watchlist → find ticker → choose CSV type"
    futures:
      - "Historical Data (system default date range)"
      - "Futures Spreads"
    options:
      - "Volatility & Greeks"
      - "Options Prices"
  home: "https://www.barchart.com/futures/major-commodities"
  my_lists: "https://www.barchart.com/my/watchlist?viewName=197689"
  WTM-Futures-Intraday:
    url: "${BARCHART_SCREEN_INTRADAY_URL}"
    wired_url: "https://www.barchart.com/my/watchlist?viewName=197689"
    watchlist_view_name: "197689"
    replace_me: false
    navigate: "My Watchlist (viewName=197689) — desk intraday futures screen"
    export_menu: "Download CSV (top-right)"
    symbols: ["BTC1!", "ES1!", "CL1!", "GC1!", "ZN1!"]
    assist_urls:
      - "https://www.barchart.com/futures/quotes/BTM26"
      - "https://www.barchart.com/futures/quotes/ESM26"
      - "https://www.barchart.com/futures/crypto"
    raw_export_patterns:
      - "*-prices-intraday-*.csv"
      - "watchlist-*-intraday-*.csv"
      - "watchlist-dailymonitor0610-intraday-*.csv"
    notes: "Env BARCHART_SCREEN_INTRADAY_URL overrides wired_url."
  WTM-Futures-Daily:
    url: "${BARCHART_SCREEN_DAILY_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/BTM26/historical-download"
    navigate: "Main Watchlist → find ticker → Historical Data (system default date range) → Download CSV"
    export_menu: "Download CSV on historical table"
    symbols: ["BTM26", "ESM26", "CLN26", "GCM26", "ZNM26"]
  WTM-Barchart-Core:
    url: "${BARCHART_CORE_BATCH_URL}"
    wired_url: "https://www.barchart.com/futures/major-commodities"
    navigate: "ARCH-4 core batch — per-symbol Historical Data download (16 symbols)"
    export_menu: "Download CSV on historical table for each symbol"
    symbols_ref: barchart_core
    symbols:
      - "^BTCUSD"
      - "^ETHUSD"
      - "^XRPUSD"
      - "^SOLUSD"
      - IBIT
      - GBTC
      - SOFR
      - "$HSI"
      - "$VHSI"
      - "$VXHY"
      - CBON
      - KHYB
      - ASHR
      - DXY00
      - GCY00
      - HGY00
    raw_export_patterns:
      - "*_daily_historical-data-*"
      - "*_daily-nearby_historical-data-*"
    notes: "ARCH-4 — optional daily core historical batch; API fast-path via BARCHART_API_KEY."
    assist_urls:
      - "https://www.barchart.com/futures/quotes/BTM26/historical-download"
      - "https://www.barchart.com/futures/quotes/ESM26/historical-download"
      - "https://www.barchart.com/futures/quotes/CLN26/historical-download"
    raw_export_patterns:
      - "*_daily-nearby_historical-data-*.csv"
  WTM-China-Cyclical:
    url: "${BARCHART_SCREEN_CHINA_CYCLICAL_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/HG1"
    status: locked
    navigate: "HG1 copper futures — primary China industrial proxy (Stage 4)"
    export_menu: "Download CSV (top-right)"
    primary_symbol: HG1
    symbols: ["HG1!"]
    notes: "FINAL LOCK — HG1 copper only. SCO1 removed."
    assist_urls:
      - "https://www.barchart.com/futures/quotes/HG1"
      - "https://www.barchart.com/futures/quotes/HG1/historical-download"
  WTM-China-Basis:
    url: "${BARCHART_SCREEN_CHINA_BASIS_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/HG1/spreads"
    status: locked
    navigate: "HG1 copper quote → Spreads tab (China ladder Stage 5)"
    export_menu: "Download CSV"
    primary_symbol: HG1
    notes: "FINAL LOCK — HG1 copper spreads only. SCO1 removed."
    assist_urls:
      - "https://www.barchart.com/futures/quotes/HG1/spreads"
  WTM-China-Futures-Daily:
    url: "${BARCHART_SCREEN_CHINA_DAILY_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/HG1/historical-download"
    status: locked
    navigate: "HG1 copper historical — roll / curve context"
    export_menu: "Download CSV on historical table"
    primary_symbol: HG1
    notes: "FINAL LOCK — HG1 copper only. SCO1 removed."
    assist_urls:
      - "https://www.barchart.com/futures/quotes/HG1/historical-download"
  WTM-BTC-Basis:
    url: "${BARCHART_SCREEN_BASIS_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/BTM26/spreads"
    replace_me: false
    source: barchart
    navigate: "Main Watchlist → find BTM26 (BT1 front) → Spreads tab → Futures Spreads → Download CSV"
    export_menu: "Download CSV"
    front_contract: BTM26
    shortcut: BT1
    contract_nearby: BTM26
    csv_type: Futures Spreads
    metrics:
      - basis_level
      - calendar_spreads
    dictionary_dataset: btc_basis
    canonical_name: "btc_basis_{YYYYMMDD}.csv"
    raw_export_patterns:
      - "futures-spreads-btm*"
      - "futures-spreads-btn*"
    notes: >
      Barchart futures-spreads only — do not route via koyfin_saved_views.
      Front month BTM26; spread CSV columns Leg1/Leg2/Type/Latest/Change feed
      basis_level and calendar_spreads for basis node + execution ref bands.
    assist_urls:
      - "https://www.barchart.com/futures/quotes/BTM26"
      - "https://www.barchart.com/futures/quotes/BTM26/historical-download"
  WTM-Options-Greeks:
    url: "${BARCHART_SCREEN_OPTIONS_URL}"
    wired_url: "https://www.barchart.com/futures/quotes/BTN26/options"
    navigate: "Main Watchlist → find ticker → Volatility & Greeks or Options Prices → Download CSV"
    export_menu: "Download CSV"
    optional: true
    raw_export_patterns:
      - "*-options-*side-by-side-intraday*"
      - "*-volatility-greeks-*"

